# Reference: GitHub Pages Deployment
#
# This workflow is provided as a reference implementation for deploying to
# GitHub Pages. The primary deployment target for this project is Vercel
# (see vercel.json at the repo root).
#
# To use GitHub Pages instead:
#   1. Set `site` and `base` in astro.config.ts:
#        site: "https://YOUR-USERNAME.github.io"
#        base: "/YOUR-REPO-NAME/"
#   2. Enable GitHub Pages in Settings → Pages → Source: GitHub Actions
#   3. This workflow will trigger automatically on push to main.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"
          cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
